name = "hex-row-reduce-conformance"
defaultTargets = ["HexRowReduceConformance", "hexrowreduce_emit_fixtures"]

[[require]]
name = "HexRowReduce"
path = ".."

[[require]]
name = "hex-test-kit"
git = "https://github.com/kim-em/hex-test-kit.git"
rev = "fb92d2703a2acf842d906044feef028c9ab924aa"

[[lean_lib]]
name = "HexRowReduceConformance"
globs = ["HexRowReduce.Conformance"]

[[lean_exe]]
name = "hexrowreduce_emit_fixtures"
root = "HexRowReduce.EmitFixtures"
